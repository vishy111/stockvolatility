<!DOCTYPE html>
<html>
<head>

  <meta charset="UTF-8">
  <title>AAPL Volatility</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://d3js.org/d3.v7.min.js"></script>

</head>
<body>

  <h1>Understanding Market Volatility (AAPL)</h1>

  <div id="annotation" style="
      font-size:18px;
      margin:20px 0;
      line-height:1.5;
      max-width:900px;
      background:#f0f4ff;
      padding:15px 20px;
      border-left:6px solid #1e88e5;
      border-radius:6px;
  "></div>

  <div id="legend" style="
      margin:10px 0;
      font-size:16px;
      line-height:1.6;
  ">
    <div><span style="display:inline-block;width:20px;height:4px;background:steelblue;margin-right:8px;"></span>Close Price</div>
    <div><span style="display:inline-block;width:20px;height:4px;background:orange;margin-right:8px;"></span>Volatility (SD20)</div>
    <div><span style="display:inline-block;width:20px;height:4px;background:darkred;margin-right:8px;"></span>Upper Band</div>
    <div><span style="display:inline-block;width:20px;height:0;border-bottom:4px dashed maroon;margin-right:8px;"></span>Lower Band</div>
</div>

  <div id="tooltip" style="
  position: absolute;
  background: white;
  border: 1px solid #ccc;
  padding: 8px 12px;
  border-radius: 6px;
  pointer-events: none;
  font-size: 14px;
  display: none;
"></div>

  <div id="chart"></div>

  <div id="controls">
  <button id="back" class="nav-btn">Back</button>
  <button id="next" class="nav-btn">Next</button>

  <div id="explore-controls" style="display:none;">
    <label><input type="checkbox" id="show-bands" checked> Bollinger Bands</label>
    <label><input type="checkbox" id="show-volatility" checked> Volatility (SD20)</label>
    <label><input type="checkbox" id="show-volume"> Volume</label>
  </div>
</div>

  <script src="script.js"></script>

</body>
</html>
